<!DOCTYPE html>
<html lang="en" class="bg-zinc-950 text-white">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>The List</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { 
      font-family: 'Inter', system-ui, sans-serif; 
      -webkit-tap-highlight-color: transparent;
    }
    .theme-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    button { touch-action: manipulation; }
  </style>
</head>
<body class="min-h-screen pb-12">
  <div class="max-w-lg mx-auto px-4 sm:px-6">
    
    <!-- Header -->
    <div class="text-center py-8 sm:py-10">
      <h1 class="text-4xl sm:text-5xl font-bold tracking-tight mb-2">
        <span class="text-violet-400">The</span> List
      </h1>
      <p class="text-zinc-400 text-base">All about us</p>
    </div>

    <div id="home" class="space-y-5">
      <button onclick="showGenerate()" class="w-full bg-violet-600 hover:bg-violet-700 active:bg-violet-800 text-white text-2xl font-semibold py-9 rounded-3xl flex items-center justify-center gap-4 active:scale-[0.97]">
        <i class="fas fa-dice text-3xl"></i> Generate a Theme
      </button>

      <button onclick="showEdit()" class="w-full bg-zinc-800 hover:bg-zinc-700 active:bg-zinc-600 text-white text-2xl font-semibold py-9 rounded-3xl flex items-center justify-center gap-4 active:scale-[0.97]">
        <i class="fas fa-edit text-3xl"></i> Edit the List
      </button>
    </div>

    <!-- Generate Screen -->
    <div id="generate-screen" class="hidden">
      <div class="bg-zinc-900 rounded-3xl p-6 sm:p-8 mb-6">
        <h2 class="text-3xl font-bold text-center mb-8">Your Theme</h2>
        
        <div id="theme-display" class="theme-card bg-zinc-800 rounded-3xl p-10 sm:p-12 text-center min-h-[260px] flex flex-col items-center justify-center">
          <div id="main-theme" class="text-4xl sm:text-5xl font-semibold mb-4 leading-tight"></div>
          <div id="sub-theme" class="text-2xl sm:text-3xl text-violet-400 mt-2"></div>
        </div>

        <div class="flex flex-col sm:flex-row gap-4 mt-10">
          <button onclick="generateNewTheme()" class="flex-1 bg-zinc-700 hover:bg-zinc-600 active:bg-zinc-500 py-6 rounded-3xl font-medium text-xl active:scale-[0.97]">
            Generate Another
          </button>
          <button onclick="shareTheme()" class="flex-1 bg-emerald-600 hover:bg-emerald-700 active:bg-emerald-500 py-6 rounded-3xl font-semibold text-xl flex items-center justify-center gap-3 active:scale-[0.97]">
            <i class="fas fa-share-alt"></i> Share This Theme
          </button>
        </div>
      </div>

      <div class="text-center text-sm text-zinc-500">
        Generation <span id="gen-count" class="text-violet-400 font-mono">1</span>/3
      </div>
    </div>

    <!-- Edit Screen -->
    <div id="edit-screen" class="hidden">
      <div class="flex justify-between items-center mb-6 sticky top-0 bg-zinc-950 py-4 z-10">
        <h2 class="text-3xl font-bold">Edit Themes</h2>
        <button onclick="showHome()" class="text-zinc-400 hover:text-white text-xl px-4 py-2">
          <i class="fas fa-arrow-left"></i>
        </button>
      </div>

      <button onclick="addMainTheme()" class="w-full bg-emerald-600 hover:bg-emerald-700 active:bg-emerald-500 py-6 rounded-3xl mb-8 font-semibold text-xl flex items-center justify-center gap-3">
        <i class="fas fa-plus"></i> Add Main Theme
      </button>

      <div id="themes-list" class="space-y-4 pb-20"></div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 bg-emerald-600 text-white px-6 py-4 rounded-3xl shadow-2xl flex items-center gap-3 z-50 text-lg">
    <i class="fas fa-check-circle"></i>
    <span id="toast-text" class="font-medium"></span>
  </div>

  <script>
    let themes = [ /* same themes as before */ 
      { name: "Not Here", subs: ["Our House", "Our Bedroom", "Indoors", "Backyard", "Hotel", "Cabin"] },
      { name: "Romantic", subs: ["Candlelight", "Slow & Sensual", "Passionate", "Teasing"] },
      { name: "Playful", subs: ["Roleplay", "Games", "Light Bondage", "Tickling"] },
      { name: "Power Exchange", subs: ["Dominant", "Submissive", "Switch"] },
      { name: "Quick & Hot", subs: [] },
      { name: "Sensual Massage", subs: [] },
      { name: "Oral Focus", subs: ["Giving", "Receiving", "69"] },
      { name: "Outdoor Adventure", subs: ["Park", "Beach", "Car"] },
      { name: "Fantasy", subs: ["Strangers", "Forbidden", "Historical"] }
    ];

    let generationCount = 0;
    let currentTheme = null;

    function loadThemes() {
      const saved = localStorage.getItem('theListThemes');
      if (saved) themes = JSON.parse(saved);
    }

    function saveThemes() {
      localStorage.setItem('theListThemes', JSON.stringify(themes));
    }

    function showHome() {
      document.getElementById('home').classList.remove('hidden');
      document.getElementById('generate-screen').classList.add('hidden');
      document.getElementById('edit-screen').classList.add('hidden');
      generationCount = 0;
    }

    function showGenerate() {
      document.getElementById('home').classList.add('hidden');
      document.getElementById('generate-screen').classList.remove('hidden');
      generateNewTheme();
    }

    function showEdit() {
      document.getElementById('home').classList.add('hidden');
      document.getElementById('edit-screen').classList.remove('hidden');
      renderThemesList();
    }

    function generateNewTheme() {
      generationCount = Math.min(generationCount + 1, 3);
      document.getElementById('gen-count').textContent = generationCount;

      const randomTheme = themes[Math.floor(Math.random() * themes.length)];
      currentTheme = randomTheme;

      document.getElementById('main-theme').textContent = randomTheme.name;
      
      const subEl = document.getElementById('sub-theme');
      subEl.textContent = (randomTheme.subs && randomTheme.subs.length > 0) 
        ? randomTheme.subs[Math.floor(Math.random() * randomTheme.subs.length)] 
        : '';
    }

    function shareTheme() {
      if (!currentTheme) return;

      let themeText = currentTheme.name;
      const subText = document.getElementById('sub-theme').textContent;
      if (subText) themeText += ` → ${subText}`;

      // More reliable copy method
      copyToClipboard(themeText);
    }

    function copyToClipboard(text) {
      // Try modern Clipboard API first
      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text).then(() => {
          showToast(`Copied: "${text}"`);
        }).catch(() => {
          fallbackCopy(text);
        });
      } else {
        fallbackCopy(text);
      }
    }

    function fallbackCopy(text) {
      const textarea = document.createElement("textarea");
      textarea.value = text;
      textarea.style.position = "fixed";
      textarea.style.left = "-999999px";
      textarea.style.top = "-999999px";
      document.body.appendChild(textarea);
      textarea.focus();
      textarea.select();

      try {
        document.execCommand('copy');
        showToast(`Copied: "${text}"`);
      } catch (err) {
        showToast("Couldn't copy automatically.\n\n" + text + "\n\n(You can long-press to copy)", true);
      }

      document.body.removeChild(textarea);
    }

    function showToast(message, error = false) {
      const toast = document.getElementById('toast');
      document.getElementById('toast-text').innerHTML = message.replace(/\n/g, '<br>');
      
      toast.style.backgroundColor = error ? '#dc2626' : '#10b981';
      toast.classList.remove('hidden');
      
      setTimeout(() => {
        toast.classList.add('opacity-0');
        setTimeout(() => {
          toast.classList.add('hidden');
          toast.classList.remove('opacity-0');
        }, 400);
      }, 3000);
    }

    // Edit functions (same as before)
    function renderThemesList() {
      const container = document.getElementById('themes-list');
      container.innerHTML = '';

      themes.forEach((theme, index) => {
        const div = document.createElement('div');
        div.className = "bg-zinc-900 rounded-3xl p-6";
        div.innerHTML = `
          <div class="flex justify-between items-start">
            <div class="text-2xl font-semibold">${theme.name}</div>
            <div class="flex gap-4 text-2xl">
              <button onclick="addSubTheme(${index})" class="text-emerald-400 hover:text-emerald-500 active:scale-90">
                <i class="fas fa-plus"></i>
              </button>
              <button onclick="deleteTheme(${index})" class="text-red-400 hover:text-red-500 active:scale-90">
                <i class="fas fa-trash"></i>
              </button>
            </div>
          </div>
          ${theme.subs && theme.subs.length ? `
            <div class="mt-6 flex flex-wrap gap-3">
              ${theme.subs.map((sub, i) => `
                <div class="bg-zinc-800 text-base px-5 py-3 rounded-2xl flex items-center gap-3">
                  ${sub}
                  <span onclick="deleteSub(${index}, ${i}); event.stopImmediatePropagation()" class="text-red-400 text-2xl leading-none cursor-pointer hover:text-red-500">×</span>
                </div>
              `).join('')}
            </div>` : '<p class="text-zinc-500 mt-4">No sub-themes yet</p>'}
        `;
        container.appendChild(div);
      });
    }

    function addMainTheme() {
      const name = prompt("Enter new main theme name:");
      if (name && name.trim()) {
        themes.push({ name: name.trim(), subs: [] });
        saveThemes();
        renderThemesList();
      }
    }

    function addSubTheme(index) {
      const name = prompt("Enter sub-theme name:");
      if (name && name.trim()) {
        if (!themes[index].subs) themes[index].subs = [];
        themes[index].subs.push(name.trim());
        saveThemes();
        renderThemesList();
      }
    }

    function deleteSub(themeIndex, subIndex) {
      if (confirm("Delete this sub-theme?")) {
        themes[themeIndex].subs.splice(subIndex, 1);
        saveThemes();
        renderThemesList();
      }
    }

    function deleteTheme(index) {
      if (confirm("Delete this entire theme?")) {
        themes.splice(index, 1);
        saveThemes();
        renderThemesList();
      }
    }

    // Initialize
    loadThemes();
    showHome();
  </script>
</body>
</html>
