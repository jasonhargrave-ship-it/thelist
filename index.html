<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>The List</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
    .theme-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    button { touch-action: manipulation; }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen pb-12">
  <div class="max-w-lg mx-auto px-4 sm:px-6">
    
    <div class="text-center py-8 sm:py-10">
      <h1 class="text-4xl sm:text-5xl font-bold tracking-tight mb-2">
        <span class="text-violet-400">The</span> List
      </h1>
      <p class="text-zinc-400 text-base">Private idea generator</p>
    </div>

    <div id="home" class="space-y-5">
      <button onclick="showGenerate()" class="w-full bg-violet-600 hover:bg-violet-700 active:bg-violet-800 text-white text-2xl font-semibold py-9 rounded-3xl flex items-center justify-center gap-4 active:scale-[0.97]">
        <i class="fas fa-dice text-3xl"></i> Generate a Theme
      </button>
      <button onclick="showEdit()" class="w-full bg-zinc-800 hover:bg-zinc-700 active:bg-zinc-600 text-white text-2xl font-semibold py-9 rounded-3xl flex items-center justify-center gap-4 active:scale-[0.97]">
        <i class="fas fa-edit text-3xl"></i> Edit the List
      </button>
    </div>

    <!-- Generate Screen -->
    <div id="generate-screen" class="hidden">
      <div class="bg-zinc-900 rounded-3xl p-6 sm:p-8 mb-6">
        <h2 class="text-3xl font-bold text-center mb-8">Your Theme</h2>
        <div id="theme-display" class="theme-card bg-zinc-800 rounded-3xl p-10 sm:p-12 text-center min-h-[260px] flex flex-col items-center justify-center">
          <div id="main-theme" class="text-4xl sm:text-5xl font-semibold mb-4"></div>
          <div id="sub-theme" class="text-2xl sm:text-3xl text-violet-400 mt-2"></div>
        </div>

        <div class="flex flex-col sm:flex-row gap-4 mt-10">
          <button onclick="generateNewTheme()" class="flex-1 bg-zinc-700 py-6 rounded-3xl font-medium text-xl active:scale-[0.97]">Generate Another</button>
          <button onclick="shareTheme()" class="flex-1 bg-emerald-600 py-6 rounded-3xl font-semibold text-xl flex items-center justify-center gap-3 active:scale-[0.97]">
            <i class="fas fa-share-alt"></i> Share This Theme
          </button>
        </div>
      </div>
    </div>

    <!-- Edit Screen -->
    <div id="edit-screen" class="hidden">
      <div class="flex justify-between items-center mb-6 sticky top-0 bg-zinc-950 py-4 z-10">
        <h2 class="text-3xl font-bold">Edit Themes</h2>
        <button onclick="showHome()" class="text-zinc-400 hover:text-white">← Back</button>
      </div>

      <div class="grid grid-cols-2 gap-3 mb-6">
        <button onclick="downloadJSON()" class="bg-blue-600 py-5 rounded-3xl text-sm font-medium">📤 Download themes.json</button>
        <button onclick="uploadJSON()" class="bg-amber-600 py-5 rounded-3xl text-sm font-medium">📥 Upload themes.json</button>
      </div>

      <button onclick="addMainTheme()" class="w-full bg-emerald-600 py-6 rounded-3xl mb-8 text-xl flex items-center justify-center gap-3">
        <i class="fas fa-plus"></i> Add Main Theme
      </button>

      <div id="themes-list" class="space-y-4 pb-20"></div>
    </div>
  </div>

  <script>
    let themes = [];
    let generationCount = 0;
    let currentTheme = null;

    async function loadThemes() {
      try {
        const res = await fetch('themes.json');
        if (res.ok) {
          themes = await res.json();
        } else throw "";
      } catch {
        themes = [
          { name: "Not Here", subs: ["Our House", "Our Bedroom", "Indoors", "Backyard", "Hotel", "Cabin"] },
          { name: "Romantic", subs: ["Candlelight", "Slow & Sensual", "Passionate", "Teasing"] },
          { name: "Playful", subs: ["Roleplay", "Games", "Light Bondage", "Tickling"] },
          { name: "Power Exchange", subs: ["Dominant", "Submissive", "Switch"] },
          { name: "Quick & Hot", subs: [] },
          { name: "Sensual Massage", subs: [] },
          { name: "Oral Focus", subs: ["Giving", "Receiving", "69"] }
        ];
      }
    }

    function downloadJSON() {
      const dataStr = JSON.stringify(themes, null, 2);
      const blob = new Blob([dataStr], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'themes.json';
      a.click();
      showToast("themes.json downloaded! Upload the updated file after editing.");
    }

    function uploadJSON() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.json';
      input.onchange = e => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = ev => {
          try {
            themes = JSON.parse(ev.target.result);
            renderThemesList();
            showToast("✅ themes.json loaded successfully!");
          } catch (err) {
            showToast("Invalid JSON file", true);
          }
        };
        reader.readAsText(file);
      };
      input.click();
    }

    function showToast(message, error = false) {
      alert(message);
    }

    function showHome() {
      document.getElementById('home').classList.remove('hidden');
      document.getElementById('generate-screen').classList.add('hidden');
      document.getElementById('edit-screen').classList.add('hidden');
      generationCount = 0;
    }

    function showGenerate() {
      document.getElementById('home').classList.add('hidden');
      document.getElementById('generate-screen').classList.remove('hidden');
      generateNewTheme();
    }

    function showEdit() {
      document.getElementById('home').classList.add('hidden');
      document.getElementById('edit-screen').classList.remove('hidden');
      renderThemesList();
    }

    function generateNewTheme() {
      generationCount = Math.min(generationCount + 1, 3);
      const randomTheme = themes[Math.floor(Math.random() * themes.length)];
      currentTheme = randomTheme;

      document.getElementById('main-theme').textContent = randomTheme.name;
      const subEl = document.getElementById('sub-theme');
      subEl.textContent = (randomTheme.subs && randomTheme.subs.length > 0) 
        ? randomTheme.subs[Math.floor(Math.random() * randomTheme.subs.length)] 
        : '';
    }

    function shareTheme() {
      if (!currentTheme) return;
      let text = currentTheme.name;
      const sub = document.getElementById('sub-theme').textContent;
      if (sub) text += ` → ${sub}`;
      navigator.clipboard.writeText(text).then(() => showToast("Copied to clipboard!"));
    }

    function renderThemesList() {
      const container = document.getElementById('themes-list');
      container.innerHTML = '';

      themes.forEach((theme, index) => {
        const div = document.createElement('div');
        div.className = "bg-zinc-900 rounded-3xl p-6";
        div.innerHTML = `
          <div class="flex justify-between items-center">
            <div class="text-2xl font-semibold">${theme.name}</div>
            <div class="flex gap-3">
              <button onclick="addSubTheme(${index})" class="text-emerald-400 text-xl"><i class="fas fa-plus"></i></button>
              <button onclick="deleteTheme(${index})" class="text-red-400 text-xl"><i class="fas fa-trash"></i></button>
            </div>
          </div>
          ${theme.subs && theme.subs.length ? `
            <div class="mt-4 flex flex-wrap gap-2">
              ${theme.subs.map((sub, i) => `
                <div class="bg-zinc-800 px-4 py-2 rounded-2xl text-sm flex items-center gap-2">
                  ${sub}
                  <span onclick="deleteSub(${index}, ${i}); event.stopImmediatePropagation()" class="text-red-400 cursor-pointer text-lg">×</span>
                </div>
              `).join('')}
            </div>` : '<p class="text-zinc-500 text-sm mt-3">No sub-themes • Click + to add</p>'}
        `;
        container.appendChild(div);
      });
    }

    function addMainTheme() {
      const name = prompt("Enter new main theme name:");
      if (name && name.trim()) {
        themes.push({ name: name.trim(), subs: [] });
        renderThemesList();
      }
    }

    function addSubTheme(index) {
      const name = prompt("Enter sub-theme:");
      if (name && name.trim()) {
        if (!themes[index].subs) themes[index].subs = [];
        themes[index].subs.push(name.trim());
        renderThemesList();
      }
    }

    function deleteSub(themeIndex, subIndex) {
      if (confirm("Delete this sub-theme?")) {
        themes[themeIndex].subs.splice(subIndex, 1);
        renderThemesList();
      }
    }

    function deleteTheme(index) {
      if (confirm("Delete entire theme?")) {
        themes.splice(index, 1);
        renderThemesList();
      }
    }

    // Initialize
    window.onload = async () => {
      await loadThemes();
      showHome();
    };
  </script>
</body>
</html>
