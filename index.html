<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>The List</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    button { touch-action: manipulation; }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen pb-12">
  <div class="max-w-lg mx-auto px-4 sm:px-6">
    
    <div class="text-center py-10">
      <h1 class="text-5xl font-bold tracking-tight">
        <span class="text-violet-400">The</span> List
      </h1>
      <p class="text-zinc-400 mt-2">Private idea generator</p>
    </div>

    <div id="home" class="space-y-6">
      <button onclick="showGenerate()" class="w-full bg-violet-600 py-10 rounded-3xl text-2xl font-semibold flex items-center justify-center gap-4">
        <i class="fas fa-dice"></i> Generate a Theme
      </button>
      <button onclick="showEdit()" class="w-full bg-zinc-800 py-10 rounded-3xl text-2xl font-semibold flex items-center justify-center gap-4">
        <i class="fas fa-edit"></i> Edit the List
      </button>
    </div>

    <!-- Generate Screen -->
    <div id="generate-screen" class="hidden">
      <div class="bg-zinc-900 rounded-3xl p-8 text-center">
        <h2 class="text-3xl font-bold mb-8">Your Theme</h2>
        <div id="main-theme" class="text-5xl font-semibold mb-4"></div>
        <div id="sub-theme" class="text-3xl text-violet-400 min-h-[50px]"></div>

        <div class="mt-12 flex gap-4">
          <button onclick="generateNewTheme()" class="flex-1 bg-zinc-700 py-6 rounded-3xl text-lg">Generate Another</button>
          <button onclick="shareTheme()" class="flex-1 bg-emerald-600 py-6 rounded-3xl text-lg">Share This Theme</button>
        </div>
      </div>
    </div>

    <!-- Edit Screen -->
    <div id="edit-screen" class="hidden">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-3xl font-bold">Edit Themes</h2>
        <button onclick="showHome()" class="text-zinc-400">← Back</button>
      </div>

      <button onclick="copyListToClipboard()" 
              class="w-full bg-blue-600 hover:bg-blue-700 py-6 rounded-3xl text-lg font-medium mb-4 flex items-center justify-center gap-3">
        <i class="fas fa-copy"></i> Copy List to Clipboard
      </button>

      <button onclick="goToGitHubEdit()" 
              class="w-full bg-zinc-700 hover:bg-zinc-600 py-6 rounded-3xl text-lg font-medium mb-8 flex items-center justify-center gap-3">
        <i class="fas fa-github"></i> Edit File on GitHub
      </button>

      <button onclick="addMainTheme()" class="w-full bg-emerald-600 py-6 rounded-3xl mb-8 text-xl">
        + Add Main Theme
      </button>

      <div id="themes-list" class="space-y-4"></div>
    </div>
  </div>

  <script>
    let themes = [
      { name: "Not Here", subs: ["Our House", "Our Bedroom", "Indoors", "Backyard", "Hotel", "Cabin"] },
      { name: "Romantic", subs: ["Candlelight", "Slow & Sensual", "Passionate", "Teasing"] },
      { name: "Playful", subs: ["Roleplay", "Games", "Light Bondage", "Tickling"] },
      { name: "Power Exchange", subs: ["Dominant", "Submissive", "Switch"] },
      { name: "Quick & Hot", subs: [] },
      { name: "Sensual Massage", subs: [] },
      { name: "Oral Focus", subs: ["Giving", "Receiving", "69"] }
    ];

    let currentTheme = null;

    function goToGitHubEdit() {
      window.open('https://github.com/jasonhargrave-ship-it/thelist/edit/main/index.html', '_blank');
    }

    function copyListToClipboard() {
      let output = "    let themes = [\n";
      
      themes.forEach((theme, i) => {
        output += `      { name: "${theme.name}", subs: [`;
        if (theme.subs && theme.subs.length > 0) {
          output += `"${theme.subs.join('", "')}"`;
        }
        output += `] }`;
        if (i < themes.length - 1) output += ",";
        output += "\n";
      });
      
      output += "    ];";

      navigator.clipboard.writeText(output).then(() => {
        alert("✅ List copied!\n\nNow click 'Edit File on GitHub' and paste this over the old themes array.");
      });
    }

    function showHome() {
      document.getElementById('home').classList.remove('hidden');
      document.getElementById('generate-screen').classList.add('hidden');
      document.getElementById('edit-screen').classList.add('hidden');
    }

    function showGenerate() {
      document.getElementById('home').classList.add('hidden');
      document.getElementById('generate-screen').classList.remove('hidden');
      generateNewTheme();
    }

    function showEdit() {
      document.getElementById('home').classList.add('hidden');
      document.getElementById('edit-screen').classList.remove('hidden');
      renderThemesList();
    }

    function generateNewTheme() {
      const randomTheme = themes[Math.floor(Math.random() * themes.length)];
      currentTheme = randomTheme;

      document.getElementById('main-theme').textContent = randomTheme.name;
      const subEl = document.getElementById('sub-theme');
      subEl.textContent = (randomTheme.subs && randomTheme.subs.length > 0) 
        ? randomTheme.subs[Math.floor(Math.random() * randomTheme.subs.length)] 
        : '';
    }

    function shareTheme() {
      if (!currentTheme) return;
      let text = currentTheme.name;
      const sub = document.getElementById('sub-theme').textContent;
      if (sub) text += ` → ${sub}`;
      navigator.clipboard.writeText(text);
      alert("✅ Copied: " + text);
    }

    function renderThemesList() {
      const container = document.getElementById('themes-list');
      container.innerHTML = '';

      themes.forEach((theme, index) => {
        const div = document.createElement('div');
        div.className = "bg-zinc-900 rounded-3xl p-6";
        div.innerHTML = `
          <div class="flex justify-between items-center">
            <div class="text-2xl font-semibold">${theme.name}</div>
            <div class="flex gap-4">
              <button onclick="addSubTheme(${index})" class="text-emerald-400"><i class="fas fa-plus"></i></button>
              <button onclick="deleteTheme(${index})" class="text-red-400"><i class="fas fa-trash"></i></button>
            </div>
          </div>
          ${theme.subs && theme.subs.length ? `
            <div class="mt-4 flex flex-wrap gap-2">
              ${theme.subs.map((sub, i) => `
                <div class="bg-zinc-800 px-4 py-2 rounded-2xl text-sm flex items-center gap-2">
                  ${sub}
                  <span onclick="deleteSub(${index}, ${i}); event.stopImmediatePropagation()" class="text-red-400 cursor-pointer">×</span>
                </div>
              `).join('')}
            </div>` : '<p class="text-zinc-500">No sub-themes</p>'}
        `;
        container.appendChild(div);
      });
    }

    function addMainTheme() {
      const name = prompt("New main theme name:");
      if (name && name.trim()) {
        themes.push({ name: name.trim(), subs: [] });
        renderThemesList();
      }
    }

    function addSubTheme(index) {
      const name = prompt("New sub-theme:");
      if (name && name.trim()) {
        if (!themes[index].subs) themes[index].subs = [];
        themes[index].subs.push(name.trim());
        renderThemesList();
      }
    }

    function deleteSub(themeIndex, subIndex) {
      if (confirm("Delete this sub-theme?")) {
        themes[themeIndex].subs.splice(subIndex, 1);
        renderThemesList();
      }
    }

    function deleteTheme(index) {
      if (confirm("Delete entire theme?")) {
        themes.splice(index, 1);
        renderThemesList();
      }
    }

    showHome();
  </script>
</body>
</html>
